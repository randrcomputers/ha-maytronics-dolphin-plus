# Maytronics Dolphin Plus — IoT GATT server add-on for ESPHome Bluetooth proxies.
# Include from your existing proxy YAML:
#
#   packages:
#     maytronics_dolphin_plus: !include dolphin-plus-gatt-addon.yaml
#
# Also ensure esp32_ble.max_connections is at least 5 (edit your existing esp32_ble
# block — do not add a second esp32_ble key).

esp32_ble_server:
  max_clients: 2
  services:
    - uuid: "fd5abba0-3935-11e5-85a6-0002a5d5c51b"
      advertise: true
      characteristics:
        - id: dolphin_iot_cmd
          uuid: "fd5abba1-3935-11e5-85a6-0002a5d5c51b"
          notify: true
          read: true
          value:
            data: [0x00]

script:
  - id: dolphin_iot_notify_script
    mode: queued
    parameters:
      payload: int[]
    then:
      - lambda: |-
          std::vector<uint8_t> bytes;
          for (int b : payload) {
            bytes.push_back((uint8_t)(b & 0xFF));
          }
          id(dolphin_iot_cmd)->set_value(bytes);
      - ble_server.characteristic.notify:
          id: dolphin_iot_cmd

api:
  actions:
    - action: dolphin_iot_notify
      variables:
        payload: int[]
      then:
        - lambda: "id(dolphin_iot_notify_script)->execute(payload);"
